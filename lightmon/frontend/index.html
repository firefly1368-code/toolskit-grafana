<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightMon</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f1117;
  color: #e2e8f0;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.card {
  background: #1a1d27;
  border: 1px solid #2a2d3e;
  border-radius: 20px;
  padding: 52px 44px;
  text-align: center;
  max-width: 500px;
  width: 100%;
  margin: 20px;
  box-shadow: 0 25px 50px rgba(0,0,0,.4);
}
.logo { font-size: 52px; margin-bottom: 18px; }
.title {
  font-size: 30px;
  font-weight: 800;
  background: linear-gradient(135deg, #6366f1, #22d3ee);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.sub { color: #64748b; margin-bottom: 36px; font-size: 15px; }
.links { display: flex; flex-direction: column; gap: 12px; }
.link {
  display: block;
  padding: 15px 20px;
  border-radius: 10px;
  background: #6366f1;
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  transition: all .2s;
  font-size: 15px;
}
.link:hover { background: #4f46e5; transform: translateY(-2px); }
.link.sec {
  background: #1e293b;
  color: #94a3b8;
  border: 1px solid #2a2d3e;
}
.link.sec:hover { border-color: #6366f1; color: #e2e8f0; }
.status {
  margin-top: 28px;
  padding: 14px;
  background: #0f172a;
  border-radius: 10px;
  font-size: 13px;
  color: #64748b;
}
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 6px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡</div>
  <div class="title">LightMon</div>
  <div class="sub">Monitoring Stack — Active</div>
  <div class="links">
    <a class="link" href="/grafana/" target="_blank">📊 Grafana Dashboard</a>
    <a class="link sec" href="/api/docs" target="_blank">🔧 Backend API</a>
  </div>
  <div class="status">
    <span class="dot"></span> Stack berjalan normal
  </div>
</div>
</body>
</html>
